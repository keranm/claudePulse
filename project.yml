name: ClaudePulse
options:
  bundleIdPrefix: com.claudepulse
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.claudepulse.app
    MARKETING_VERSION: "1.0-Beta"
    CURRENT_PROJECT_VERSION: "100"
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: AUEPCDGA5G
      CODE_SIGN_IDENTITY: Apple Development
    Release:
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: AUEPCDGA5G
      CODE_SIGN_IDENTITY: "Developer ID Application"

schemes:
  ClaudePulse:
    build:
      targets:
        ClaudePulse: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  ClaudePulse:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ClaudePulse
        excludes:
          - "**/*.md"
    resources:
      - ClaudePulse/Assets.xcassets
    info:
      path: ClaudePulse/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Claude Pulse
        CFBundleShortVersionString: "1.0-Beta"
        CFBundleVersion: "100"
        NSHumanReadableCopyright: "Copyright © 2025 Claude Pulse"
        NSPrincipalClass: NSApplication
    entitlements:
      path: ClaudePulse/ClaudePulse.entitlements
    settings:
      base:
        PRODUCT_NAME: ClaudePulse
        INFOPLIST_FILE: ClaudePulse/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudePulse/ClaudePulse.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
