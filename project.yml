name: ClaudePulse

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0

options:
  bundleIdPrefix: com.claudepulse
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.claudepulse.app
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "5"
    ENABLE_HARDENED_RUNTIME: YES
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: AUEPCDGA5G
      CODE_SIGN_IDENTITY: Apple Development
    Release:
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: AUEPCDGA5G
      CODE_SIGN_IDENTITY: "Developer ID Application"
      PROVISIONING_PROFILE_SPECIFIER: ""
      ARCHS: "arm64 x86_64"

schemes:
  ClaudePulse:
    build:
      targets:
        ClaudePulse: all
        ClaudePulseWidget: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  ClaudePulse:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ClaudePulse
        excludes:
          - "**/*.md"
    resources:
      - ClaudePulse/Assets.xcassets
    info:
      path: ClaudePulse/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Claude Pulse
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "5"
        NSHumanReadableCopyright: "Copyright © 2025 Claude Pulse"
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: "public.app-category.developer-tools"
        SUFeedURL: "https://raw.githubusercontent.com/keranm/claudePulse/main/appcast.xml"
        SUEnableAutomaticChecks: true
        SUPublicEDKey: "0N8+0Z5XqMfyh0YH0stI9h7/7bf6qq0XmMzcQgXUzEQ="
    entitlements:
      path: ClaudePulse/ClaudePulse.entitlements
    dependencies:
      - target: ClaudePulseWidget
        embed: true
      - sdk: WidgetKit.framework
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: ClaudePulse
        INFOPLIST_FILE: ClaudePulse/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudePulse/ClaudePulse.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ClaudePulseWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ClaudePulseWidget
      - path: ClaudePulse/Core/JSONLParser.swift
      - path: ClaudePulse/Core/UsageCalculator.swift
      - path: ClaudePulse/Models/UsageState.swift
    info:
      path: ClaudePulseWidget/Info.plist
      properties:
        CFBundleDisplayName: Claude Pulse Widget
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "5"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ClaudePulseWidget/ClaudePulseWidget.entitlements
    settings:
      base:
        PRODUCT_NAME: ClaudePulseWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.claudepulse.app.widget
        SKIP_INSTALL: YES
        INFOPLIST_FILE: ClaudePulseWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudePulseWidget/ClaudePulseWidget.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: AUEPCDGA5G
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: AUEPCDGA5G
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: ""
